<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Factor42 logo">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;800&amp;display=swap');
    </style>
    <linearGradient id="f42-grad-w" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0052CC"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
  </defs>

  <!-- ── ICON MARK ── -->
  <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#f42-grad-w)"/>
  <rect x="0" y="0" width="80" height="38" rx="20" fill="white" fill-opacity="0.07"/>
  <!-- Geometric F -->
  <rect x="19" y="18" width="11" height="44" rx="3.5" fill="white"/>
  <rect x="19" y="18" width="36" height="11" rx="3.5" fill="white"/>
  <rect x="19" y="34" width="25" height="10" rx="3" fill="white"/>

  <!-- ── WORDMARK (white version) ── -->
  <text font-family="'Plus Jakarta Sans', Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" y="52">
    <tspan x="98" font-weight="500" fill="white" letter-spacing="-0.5">Factor</tspan><tspan font-weight="800" fill="#00B4D8" letter-spacing="-1">42</tspan>
  </text>
  <text x="98" y="70" font-family="'Plus Jakarta Sans', Inter, -apple-system, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="0.05em">AD OPS AT SCALE</text>
</svg>
